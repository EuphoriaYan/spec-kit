schema_version: "1.0"

extension:
  id: team
  name: "AI Team SDD Skills"
  version: "0.6.0"
  description: "Six role-oriented enterprise SDD skills plus task-scoped Knowledge and Memory consolidation."
  author: AI Team Template
  repository: https://github.com/EuphoriaYan/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.12.4"
  tools:
    - name: gh
      required: false
    - name: codegraph
      version: ">=1.0.0,<2.0.0"
      required: true

provides:
  commands:
    - name: speckit.team.specify
      file: commands/speckit.team.specify.md
      description: "Business/Product role: clarify Feature User Stories and publish or print the primary Issue."
      resources:
        - source: docs/repository-boundary.md
          target: references/repository-boundary.md
    - name: speckit.team.plan-and-task
      file: commands/speckit.team.plan-and-task.md
      description: "Architect role: summarize an accepted Feature Issue and produce Code Graph grounded Plan, parallel Tasks, self-tests, and one readiness check."
      resources:
        - source: docs/code-graph-contract.md
          target: references/code-graph-contract.md
        - source: docs/permission-envelope.md
          target: references/permission-envelope.md
        - source: docs/memory-runtime.md
          target: references/memory-runtime.md
        - source: references/internal/context.md
          target: references/context.md
        - source: references/internal/handoff-spec-sync.md
          target: references/handoff-spec-sync.md
        - source: references/internal/feature-spec.md
          target: references/feature-spec.md
        - source: templates/plan-and-task-template.md
          target: references/plan-and-task-format.md
        - source: scripts/check_plan_and_task.py
          target: scripts/check_plan_and_task.py
        - source: scripts/check_permission_envelope.py
          target: scripts/check_permission_envelope.py
        - source: scripts/work_item_paths.py
          target: scripts/work_item_paths.py
        - source: scripts/memory_adapter.py
          target: scripts/memory_adapter.py
        - source: scripts/bash/handoff-spec-common.sh
          target: scripts/bash/handoff-spec-common.sh
        - source: scripts/bash/sync-handoff-spec.sh
          target: scripts/bash/sync-handoff-spec.sh
        - source: scripts/powershell/HandoffSpecCommon.ps1
          target: scripts/powershell/HandoffSpecCommon.ps1
        - source: scripts/powershell/Sync-HandoffSpec.ps1
          target: scripts/powershell/Sync-HandoffSpec.ps1
    - name: speckit.team.assess
      file: commands/speckit.team.assess.md
      description: "Bug assessor role: analyze a report or review finding, preserve original intent, and route only risky decisions to humans."
      resources:
        - source: docs/code-graph-contract.md
          target: references/code-graph-contract.md
        - source: references/internal/context.md
          target: references/context.md
        - source: docs/memory-runtime.md
          target: references/memory-runtime.md
        - source: scripts/memory_adapter.py
          target: scripts/memory_adapter.py
    - name: speckit.team.fix
      file: commands/speckit.team.fix.md
      description: "Bug fixer role: apply a ready or risk-approved assessment, verify it, update PR progress, and re-enter review."
      resources:
        - source: references/internal/context.md
          target: references/context.md
        - source: docs/memory-runtime.md
          target: references/memory-runtime.md
        - source: scripts/memory_adapter.py
          target: scripts/memory_adapter.py
    - name: speckit.team.implement
      file: commands/speckit.team.implement.md
      description: "Developer role: implement task-ready Feature work, verify it, and enter the automatic quality loop before PR submission."
      resources:
        - source: references/internal/context.md
          target: references/context.md
        - source: references/internal/implement-pr.md
          target: references/implement-pr.md
        - source: scripts/check_permission_envelope.py
          target: scripts/check_permission_envelope.py
        - source: scripts/work_item_paths.py
          target: scripts/work_item_paths.py
        - source: docs/memory-runtime.md
          target: references/memory-runtime.md
        - source: scripts/memory_adapter.py
          target: scripts/memory_adapter.py
    - name: speckit.team.review
      file: commands/speckit.team.review.md
      description: "Reviewer role: assess a PR or local diff, route repairable findings, and produce a merge recommendation."
      resources:
        - source: references/internal/context.md
          target: references/context.md
        - source: docs/memory-runtime.md
          target: references/memory-runtime.md
        - source: scripts/memory_adapter.py
          target: scripts/memory_adapter.py
    - name: speckit.team.memory-consolidate
      file: commands/speckit.team.memory-consolidate.md
      description: "Support role: capture advisory lessons and promote human-approved requirements into task-scoped project Knowledge."
      resources:
        - source: docs/memory-tiers.md
          target: references/memory-tiers.md
        - source: scripts/memory_adapter.py
          target: scripts/memory_adapter.py

  config:
    - name: ai-team-config.yml
      template: config-template.yml
      description: "AI Team repository roles, privacy boundaries, role isolation, and evidence settings."
      required: false

tags:
  - ai-team
  - enterprise
  - sdd
  - roles
  - collaboration
  - evidence
  - code-graph
  - implementation
  - review
  - bugfix
  - assessment
  - knowledge
  - memory
