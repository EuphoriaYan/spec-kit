schema_version: "1.0"

extension:
  id: team
  name: "Team Bugfix, Implement & Review"
  version: "0.1.0"
  description: "Assess and fix bugs, implement task-ready features, verify results, optionally open pull requests, and review pull requests against Spec-Driven Development artifacts."
  author: spec-kit-core
  repository: https://github.com/github/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.12.4"
  tools:
    - name: gh
      required: false

provides:
  commands:
    - name: speckit.team.assess
      file: commands/speckit.team.assess.md
      description: "Assess an issue URL or bug description and write .specify/bugfix/<bug-slug>/assessment.md"
    - name: speckit.team.fix
      file: commands/speckit.team.fix.md
      description: "Fix a bug from assessment.md, verify it, write fix.md/test.md, and ask before creating a PR"
    - name: speckit.team.implement
      file: commands/speckit.team.implement.md
      description: "Implement selected tasks from a feature, verify the changes, and optionally submit a pull request"
    - name: speckit.team.review
      file: commands/speckit.team.review.md
      description: "Review a pull request for correctness, evidence, permissions, and SDD alignment"

tags:
  - "team"
  - "bugfix"
  - "assessment"
  - "implementation"
  - "review"
  - "sdd"
